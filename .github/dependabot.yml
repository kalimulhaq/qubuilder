version: 2
updates:
    - package-ecosystem: "composer"
      directory: "/"
      schedule:
          interval: "weekly"
      labels:
          - "dependencies"
      open-pull-requests-limit: 5
      groups:
          composer-minor:
              update-types:
                  - "minor"
                  - "patch"

    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
      labels:
          - "dependencies"
      open-pull-requests-limit: 5
      groups:
          actions-minor:
              update-types:
                  - "minor"
                  - "patch"
