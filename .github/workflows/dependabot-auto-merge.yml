name: dependabot-auto-merge

on: pull_request_target

permissions:
    contents: write
    pull-requests: write

jobs:
    auto-merge:
        runs-on: ubuntu-latest
        # Only act on PRs opened by Dependabot.
        if: ${{ github.actor == 'dependabot[bot]' }}

        steps:
            - name: Fetch Dependabot metadata
              id: metadata
              uses: dependabot/fetch-metadata@v2
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}

            # Auto-merge only patch & minor updates. Major bumps fall through and
            # wait for manual review. Branch protection ensures the merge only
            # happens after the required checks (tests, phpstan, pint) pass.
            - name: Enable auto-merge for patch/minor updates
              if: ${{ steps.metadata.outputs.update-type != 'version-update:semver-major' }}
              run: gh pr merge --auto --squash "$PR_URL"
              env:
                  PR_URL: ${{ github.event.pull_request.html_url }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
